name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source and language data
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate generated translation data
        run: pnpm check-generated

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: Enforce bundle budgets
        run: pnpm bundle:check

      - name: Install Chromium for browser tests
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Upload browser-test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-manifest
          path: dist/.vite/manifest.json
          if-no-files-found: ignore
